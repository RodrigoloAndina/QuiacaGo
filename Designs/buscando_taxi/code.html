<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Buscando Taxi - QuiacaGo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        /* Pulsing Animation */
        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            80%, 100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .pulse-circle {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: theme('colors.primary-container');
            opacity: 0.2;
        }
        
        .pulse-circle-1 {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .pulse-circle-2 {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            animation-delay: 0.6s;
        }
        .pulse-circle-3 {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            animation-delay: 1.2s;
        }

        .map-overlay {
            background: linear-gradient(to bottom, rgba(249, 249, 252, 0.3) 0%, rgba(249, 249, 252, 1) 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#ffb59d",
                        "outline": "#737784",
                        "inverse-on-surface": "#f0f0f3",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#b1c5ff",
                        "tertiary": "#3c3625",
                        "background": "#f9f9fc",
                        "primary-container": "#0047ab",
                        "surface-container": "#eeeef0",
                        "tertiary-fixed": "#ece2c9",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434653",
                        "tertiary-fixed-dim": "#cfc6ae",
                        "primary": "#00327d",
                        "surface-container-low": "#f3f3f6",
                        "surface-dim": "#dadadc",
                        "on-secondary-container": "#742405",
                        "surface-variant": "#e2e2e5",
                        "surface-container-highest": "#e2e2e5",
                        "secondary-container": "#fe8c65",
                        "surface-tint": "#2559bd",
                        "on-primary-fixed-variant": "#00419e",
                        "outline-variant": "#c3c6d5",
                        "on-background": "#1a1c1e",
                        "on-primary-fixed": "#001946",
                        "on-secondary-fixed": "#390c00",
                        "on-secondary-fixed-variant": "#7e2c0c",
                        "secondary": "#9d4221",
                        "inverse-primary": "#b1c5ff",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#c7bea6",
                        "on-tertiary-fixed-variant": "#4c4634",
                        "surface-bright": "#f9f9fc",
                        "surface": "#f9f9fc",
                        "on-primary-container": "#a5bdff",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#ffdbd0",
                        "on-tertiary-fixed": "#201b0c",
                        "on-surface": "#1a1c1e",
                        "inverse-surface": "#2f3133",
                        "primary-fixed": "#dae2ff",
                        "tertiary-container": "#534d3a",
                        "surface-container-high": "#e8e8ea",
                        "on-primary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "margin-desktop": "64px",
                        "base": "8px",
                        "margin-mobile": "20px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "display": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "display": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen relative overflow-hidden font-body-md antialiased flex flex-col">
<!-- Top App Bar (Modified for transactional view - back button only) -->
<header class="bg-transparent flex justify-between items-center w-full px-margin-mobile h-14 z-50 absolute top-0 left-0">
<button aria-label="Cancelar busqueda" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface/80 backdrop-blur-sm shadow-sm text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<!-- Map Background -->
<div class="absolute inset-0 z-0 h-[60vh]">
<!-- Placeholder for actual map. Using an image for visual representation -->
<img class="w-full h-full object-cover opacity-60" data-alt="A stylized, minimalist vector map of a small Andean town with a grid layout, featuring muted earthy tones, soft grays, and subtle hints of terracotta. The map is viewed from a top-down perspective, looking clean and modern, suitable for a ride-sharing app background. High-key lighting, soft aesthetic." data-location="La Quiaca, Argentina" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAUMLtMUwcUsWjXQV6WCBmQMW31baLo7BS_fm9hQXhLUfg76jE-wfI6Hxl4zIrj3b45fvFein_LSrqKCI0spCucG1kOcmxlIemgYADGR4vuIOOn41HrxgwYX44pPDdUWngMO4C0g3QiShb10kWl4_FitKLke0ZJDzaEvGlsygpo4HBG_Rhbcs7ZTrWKkKTVb9TxIZKrdRZKZ3UpSCz4a3bzLzxk6Xma8PIYMlaVPIT8vEihUXjV-ZrY"/>
<div class="absolute inset-0 map-overlay"></div>
</div>
<!-- Main Content Area -->
<main class="relative z-10 flex flex-col items-center justify-end flex-grow pb-10">
<!-- Searching Animation Container -->
<div class="relative w-full flex items-center justify-center mb-12 h-64 mt-32">
<!-- Pulsing Rings -->
<div class="pulse-circle pulse-circle-1"></div>
<div class="pulse-circle pulse-circle-2"></div>
<div class="pulse-circle pulse-circle-3"></div>
<!-- Central Icon -->
<div class="relative z-10 w-20 h-20 bg-surface rounded-full shadow-lg border border-surface-container-high flex items-center justify-center">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined text-[32px]" data-icon="local_taxi" data-weight="fill">local_taxi</span>
</div>
</div>
<!-- Floating Map Pins (Decorative) -->
<div class="absolute w-full h-full pointer-events-none">
<div class="absolute top-[20%] left-[25%] animate-[bounce_4s_ease-in-out_infinite] opacity-40">
<span class="material-symbols-outlined text-secondary" data-icon="location_on" data-weight="fill">location_on</span>
</div>
<div class="absolute bottom-[30%] right-[30%] animate-[bounce_3.5s_ease-in-out_infinite_0.5s] opacity-30">
<span class="material-symbols-outlined text-primary" data-icon="location_on" data-weight="fill">location_on</span>
</div>
</div>
</div>
<!-- Information Sheet (Bottom-heavy design) -->
<div class="w-full max-w-md px-margin-mobile flex flex-col items-center text-center">
<!-- Progress Indicator -->
<div class="w-12 h-1 bg-surface-container-high rounded-full mb-6 overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-primary rounded-full w-1/3 animate-[slide_2s_ease-in-out_infinite]"></div>
</div>
<style>
                @keyframes slide {
                    0% { left: -33%; }
                    100% { left: 100%; }
                }
            </style>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">
                Buscando un conductor
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-8 px-4">
                Estamos contactando a los taxis más cercanos a tu ubicación en La Quiaca.
            </p>
<!-- Ride Details Summary Card -->
<div class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-4 shadow-sm mb-6 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-secondary-container/20 rounded-full flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="home_pin">home_pin</span>
</div>
<div class="text-left">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Destino</p>
<p class="font-body-md text-body-md font-medium text-on-surface truncate max-w-[180px]">Terminal de Ómnibus</p>
</div>
</div>
<div class="h-8 w-[1px] bg-outline-variant"></div>
<div class="text-right">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Est. Costo</p>
<p class="font-body-md text-body-md font-medium text-on-surface">~$1.500</p>
</div>
</div>
<!-- Cancel Button -->
<button class="w-full h-14 bg-surface-container-lowest border border-outline-variant text-on-surface font-label-lg text-label-lg rounded-full shadow-sm hover:bg-surface-container-low transition-colors duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="close">close</span>
                Cancelar viaje
            </button>
</div>
</main>
<!-- Suppressed Navbars - Transactional State -->
<!-- BottomNavBar intentionally omitted based on instructions for transactional/linear screens -->
</body></html>
