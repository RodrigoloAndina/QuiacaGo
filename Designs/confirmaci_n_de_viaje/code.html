<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Map pattern background for the top area */
        .map-pattern {
            background-color: #e8e8ea;
            background-image: radial-gradient(#c3c6d5 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Simulated route path */
        .route-path {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 60%;
            border: 4px dashed #00327d;
            border-radius: 40px;
            z-index: 1;
        }
        
        /* Simulated markers */
        .marker-origin {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 24px;
            height: 24px;
            background-color: #9d4221;
            border: 4px solid #ffffff;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 4px 12px rgba(0, 50, 125, 0.2);
        }
        
        .marker-dest {
            position: absolute;
            bottom: 30%;
            right: 20%;
            width: 24px;
            height: 24px;
            background-color: #00327d;
            border: 4px solid #ffffff;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 4px 12px rgba(0, 50, 125, 0.2);

<body class="bg-surface text-on-surface font-body-md antialiased flex flex-col min-h-screen">
<!-- Top App Bar (Modified for transactional screen) -->
<header class="bg-surface shadow-sm w-full px-margin-mobile h-14 z-50 flex justify-between items-center fixed top-0">
<button aria-label="Volver" class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-surface-container-low rounded-full transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary">Confirmar Viaje</h1>
<div class="w-10 h-10"></div> <!-- Spacer for balance -->
</header>

<main class="flex-grow pt-14 flex flex-col md:max-w-xl md:mx-auto md:w-full md:shadow-lg md:bg-surface-container-lowest md:my-8 md:rounded-xl md:overflow-hidden relative pb-32">
<!-- Map Area -->
<div class="h-64 md:h-80 w-full map-pattern relative">

<!-- Overlay simulated elements if image fails to load or as decorative base -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface/40"></div>
<!-- Pin Overlays -->
<div class="absolute top-1/4 left-1/4 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center z-10">
<div class="bg-surface-container-lowest rounded-full p-1 shadow-md mb-1">
<span class="material-symbols-outlined text-secondary icon-fill" data-icon="trip_origin" data-weight="fill">trip_origin</span>
</div>
<div class="bg-surface-container-lowest text-on-surface font-label-sm text-label-sm px-2 py-1 rounded shadow-md">Origen</div>
</div>
<div class="absolute bottom-1/3 right-1/4 transform translate-x-1/2 translate-y-1/2 flex flex-col items-center z-10">
<div class="bg-surface-container-lowest text-on-surface font-label-sm text-label-sm px-2 py-1 rounded shadow-md mb-1">Destino</div>
<div class="bg-primary-container text-on-primary-container rounded-full p-1 shadow-md">
<span class="material-symbols-outlined icon-fill" data-icon="location_on" data-weight="fill">location_on</span>
</div>
</div>
</div>
<!-- Details Card / Bottom Sheet on Mobile -->
<div class="bg-surface-container-lowest rounded-t-xl -mt-6 z-20 flex-grow px-margin-mobile pt-6 pb-container-padding flex flex-col gap-6 shadow-[0_-4px_20px_rgba(0,71,171,0.04)] relative">
<!-- Handle for visual mobile affordance -->
<div class="w-12 h-1 bg-outline-variant rounded-full mx-auto absolute top-3 left-1/2 transform -translate-x-1/2 md:hidden"></div>

<div class="flex flex-col gap-4 relative">
<!-- Vertical Line Connecting Points -->
<div class="absolute left-3 top-4 bottom-4 w-0.5 bg-outline-variant z-0"></div>
<!-- Origin -->
<div class="flex items-start gap-base z-10">
<div class="w-6 h-6 rounded-full bg-surface-container-lowest flex items-center justify-center border-2 border-secondary mt-0.5">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">Origen</span>
<span class="font-body-md text-body-md text-on-surface font-medium">Av. Sarmiento 345, La Quiaca</span>
</div>
</div>
<!-- Destination -->
<div class="flex items-start gap-base z-10">
<div class="w-6 h-6 rounded-full bg-surface-container-lowest flex items-center justify-center border-2 border-primary mt-0.5">
<span class="material-symbols-outlined text-[16px] text-primary icon-fill" data-icon="location_on" data-weight="fill">location_on</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">Destino</span>
<span class="font-body-md text-body-md text-on-surface font-medium">Terminal de Ómnibus, Villazón</span>
</div>
</div>
</div>

</div>
<div class="flex items-center gap-2 bg-surface-container-low px-3 py-2 rounded-lg border border-surface-variant cursor-pointer hover:bg-surface-container transition-colors duration-200">
<span class="material-symbols-outlined text-secondary" data-icon="payments">payments</span>
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">Pago</span>
<span class="font-body-md text-body-md text-on-surface font-medium leading-none">Efectivo</span>
</div>
<span class="material-symbols-outlined text-outline ml-1" data-icon="chevron_right">chevron_right</span>
</div>
</div>

<div class="fixed bottom-0 w-full bg-surface-container-lowest p-margin-mobile border-t border-outline-variant shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-50 md:max-w-xl md:left-1/2 md:transform md:-translate-x-1/2 md:border-x md:rounded-b-xl">
<button class="w-full h-14 bg-primary text-on-primary font-label-lg text-label-lg rounded-xl flex items-center justify-center gap-2 hover:bg-primary-fixed-variant transition-colors duration-200 active:scale-[0.98] shadow-md">
<span>Confirmar Viaje</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
