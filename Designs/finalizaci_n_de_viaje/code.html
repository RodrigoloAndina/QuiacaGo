<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QuiacaGo - Trip Completion</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#ffb59d",
                        "outline": "#737784",
                        "inverse-on-surface": "#f0f0f3",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#b1c5ff",
                        "tertiary": "#3c3625",
                        "background": "#f9f9fc",
                        "primary-container": "#0047ab",
                        "surface-container": "#eeeef0",
                        "tertiary-fixed": "#ece2c9",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434653",
                        "tertiary-fixed-dim": "#cfc6ae",
                        "primary": "#00327d",
                        "surface-container-low": "#f3f3f6",
                        "surface-dim": "#dadadc",
                        "on-secondary-container": "#742405",
                        "surface-variant": "#e2e2e5",
                        "surface-container-highest": "#e2e2e5",
                        "secondary-container": "#fe8c65",
                        "surface-tint": "#2559bd",
                        "on-primary-fixed-variant": "#00419e",
                        "outline-variant": "#c3c6d5",
                        "on-background": "#1a1c1e",
                        "on-primary-fixed": "#001946",
                        "on-secondary-fixed": "#390c00",
                        "on-secondary-fixed-variant": "#7e2c0c",
                        "secondary": "#9d4221",
                        "inverse-primary": "#b1c5ff",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#c7bea6",
                        "on-tertiary-fixed-variant": "#4c4634",
                        "surface-bright": "#f9f9fc",
                        "surface": "#f9f9fc",
                        "on-primary-container": "#a5bdff",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#ffdbd0",
                        "on-tertiary-fixed": "#201b0c",
                        "on-surface": "#1a1c1e",
                        "inverse-surface": "#2f3133",
                        "primary-fixed": "#dae2ff",
                        "tertiary-container": "#534d3a",
                        "surface-container-high": "#e8e8ea",
                        "on-primary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1.5rem"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "margin-desktop": "64px",
                        "base": "8px",
                        "margin-mobile": "20px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "display": ["Inter"],
                        "label-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "display": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .star-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            color: #fe8c65; /* secondary-container */
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<!-- Main Container Card (Surface 1) -->
<div class="bg-surface-container-lowest w-full max-w-md rounded-2xl p-container-padding shadow-lg border border-surface-variant flex flex-col items-center text-center">
<!-- Success Icon / Checkmark -->
<div class="w-16 h-16 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Headline -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">¡Viaje completado!</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">Gracias por viajar con QuiacaGo.</p>
<!-- Final Amount Display -->
<div class="mb-10 w-full py-6 bg-surface-container-low rounded-xl border border-surface-variant">
<p class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider mb-2">Total abonado</p>
<p class="font-display text-display text-on-background">$4,500</p>
</div>
<!-- Rating Section -->
<div class="w-full mb-8">
<p class="font-headline-md text-headline-md text-on-background mb-4">¿Cómo estuvo tu viaje?</p>
<!-- Stars -->
<div class="flex justify-center gap-2 mb-6" id="rating-stars">
<button class="p-2 transition-transform hover:scale-110 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary rounded-full" type="button">
<span class="material-symbols-outlined text-4xl text-outline-variant star-icon">star</span>
</button>
<button class="p-2 transition-transform hover:scale-110 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary rounded-full" type="button">
<span class="material-symbols-outlined text-4xl text-outline-variant star-icon">star</span>
</button>
<button class="p-2 transition-transform hover:scale-110 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary rounded-full" type="button">
<span class="material-symbols-outlined text-4xl text-outline-variant star-icon">star</span>
</button>
<button class="p-2 transition-transform hover:scale-110 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary rounded-full" type="button">
<span class="material-symbols-outlined text-4xl text-outline-variant star-icon">star</span>
</button>
<button class="p-2 transition-transform hover:scale-110 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary rounded-full" type="button">
<span class="material-symbols-outlined text-4xl text-outline-variant star-icon">star</span>
</button>
</div>
<!-- Comment Text Area -->
<div class="w-full">
<label class="sr-only" for="trip-comment">Deja un comentario (opcional)</label>
<textarea class="w-full bg-surface text-on-surface border border-outline-variant rounded-lg p-4 font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors resize-none placeholder-on-surface-variant" id="trip-comment" placeholder="Deja un comentario (opcional)..." rows="3"></textarea>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full h-14 bg-primary text-on-primary font-label-lg text-label-lg rounded-full flex items-center justify-center transition-transform active:scale-[0.98] hover:bg-on-primary-fixed-variant shadow-md" type="button">
            Finalizar
        </button>
</div>
<!-- Interaction Script for Stars -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('#rating-stars button');
            const starIcons = document.querySelectorAll('.star-icon');

            stars.forEach((star, index) => {
                star.addEventListener('click', () => {
                    // Reset all stars
                    starIcons.forEach(icon => {
                        icon.classList.remove('star-filled');
                        icon.classList.add('text-outline-variant');
                    });

                    // Fill stars up to clicked index
                    for (let i = 0; i <= index; i++) {
                        starIcons[i].classList.remove('text-outline-variant');
                        starIcons[i].classList.add('star-filled');
                    }
                });
            });
        });
    </script>
</body></html>
