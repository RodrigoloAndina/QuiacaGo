<!-- Simple JavaScript for the Timer Visuals -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const timeLeftElement = document.getElementById('countdownText');
            const progressRing = document.getElementById('progressRing');
            let timeLeft = 15;
            const totalTime = 15;
            
            // Circumference of circle with r=45 (2 * PI * 45) ≈ 282.7
            const circumference = 2 * Math.PI * 45;
            progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
            progressRing.style.strokeDashoffset = '0';

            const timerInterval = setInterval(() => {
                timeLeft--;
                timeLeftElement.textContent = timeLeft;
                
                // Calculate offset
                const offset = circumference - (timeLeft / totalTime) * circumference;
                progressRing.style.strokeDashoffset = offset;

                // Change color if time is running out (< 5 seconds)
                if (timeLeft <= 5) {
                    progressRing.style.stroke = '#ba1a1a'; // Error color
                    timeLeftElement.classList.remove('text-primary');
                    timeLeftElement.classList.add('text-error');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    // Handle timeout logic here (e.g., auto-reject)
                }
            }, 1000);
        });
    </script>
