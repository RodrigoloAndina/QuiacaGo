<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.pin-input');
            const btnStart = document.getElementById('btn-start-trip');
            const stateValidation = document.getElementById('state-validation');
            const stateActive = document.getElementById('state-active');
            const btnEnd = document.getElementById('btn-end-trip');

            // Handle PIN input logic
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    // Allow only numbers
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    
                    if (e.target.value) {
                        // Move to next input
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                    checkPinComplete();
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });

            function checkPinComplete() {
                const isComplete = Array.from(inputs).every(input => input.value.length === 1);
                if (isComplete) {
                    btnStart.classList.remove('opacity-50', 'cursor-not-allowed');
                    btnStart.classList.add('animate-[pulse_2s_infinite]');
                } else {
                    btnStart.classList.add('opacity-50', 'cursor-not-allowed');
                    btnStart.classList.remove('animate-[pulse_2s_infinite]');
                }
            }

            // Handle State Transition (Start Trip)
            btnStart.addEventListener('click', () => {
                const isComplete = Array.from(inputs).every(input => input.value.length === 1);
                if (!isComplete) return;

                // Add simple fade out/in effect
                stateValidation.style.opacity = '0';
                setTimeout(() => {
                    stateValidation.classList.add('hidden');
                    stateActive.classList.remove('hidden');
                    // Trigger reflow
                    void stateActive.offsetWidth;
                    stateActive.style.opacity = '1';
                }, 200);
            });
            
            // Initial style setup for transition
            stateValidation.style.transition = 'opacity 0.2s ease';
            stateActive.style.transition = 'opacity 0.2s ease';
            stateActive.style.opacity = '0';
        });
    </script>
